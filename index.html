<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日 arXiv 论文精选</title>
  <meta
    name="description"
    content="每天自动整理 arXiv 上与 vision-language-action、world action model、机器人和自动驾驶相关的重要论文。"
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">每日更新 · arXiv Digest</p>
        <h1>VLA / WAM 重要论文精选</h1>
        <p class="hero-text">
          自动追踪 `cs.RO`、`cs.AI`、`cs.CV`、`cs.LG` 中与机器人、自动驾驶、
          `vision-language-action`、`world action model` 相关的最新论文。
        </p>
      </div>
      <div class="hero-panel">
        <div class="metric">
          <span class="metric-label">每日精选</span>
          <strong id="paper-count">20</strong>
        </div>
        <div class="metric">
          <span class="metric-label">更新时间</span>
          <strong id="generated-at">等待更新</strong>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-copy">
        <h2>最新消息总结展示</h2>
        <p id="meta-description">正在加载最新论文数据。</p>
      </div>
      <div class="toolbar-actions">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="搜索题目、摘要、作者、分类"
          autocomplete="off"
        >
        <a class="ghost-link" href="https://arxiv.org/" target="_blank" rel="noreferrer">打开 arXiv</a>
      </div>
    </section>

    <section class="summary-bar">
      <span id="summary-window">近 7 天最新提交</span>
      <span id="summary-categories">重点分类：cs.RO / cs.AI / cs.CV / cs.LG</span>
      <span id="summary-keywords">关键词：VLA / WAM / 机器人 / 自动驾驶</span>
    </section>

    <section>
      <ul id="paper-list" class="paper-list" aria-live="polite"></ul>
      <div id="empty-state" class="empty-state" hidden>
        当前没有匹配的论文，稍后再试或换一个关键词搜索。
      </div>
    </section>

    <nav id="pagination" class="pagination" aria-label="分页导航"></nav>
  </main>

  <script src="./data/site-data.js"></script>
  <script src="./script.js"></script>
</body>
</html>
